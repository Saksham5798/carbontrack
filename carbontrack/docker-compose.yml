version: '3.8'

services:
  # --------------------------------------------------------
  # Frontend Service (Nginx)
  # --------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carbontrack-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - carbontrack-network

  # --------------------------------------------------------
  # Backend Service (Flask + Gunicorn)
  # --------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carbontrack-backend
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=production
      - DB_HOST=database
      - DB_PORT=3306
      - DB_USER=carbontrack_user
      - DB_PASSWORD=YourStrongPassword@123
      - DB_NAME=carbontrack_db
      - JWT_SECRET=super_secret_production_key_123!
    depends_on:
      database:
        condition: service_healthy
    restart: always
    networks:
      - carbontrack-network

  # --------------------------------------------------------
  # Database Service (MySQL 8)
  # --------------------------------------------------------
  database:
    image: mysql:8.0
    container_name: carbontrack-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=RootPassword@123
      - MYSQL_DATABASE=carbontrack_db
      - MYSQL_USER=carbontrack_user
      - MYSQL_PASSWORD=YourStrongPassword@123
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carbontrack-network

volumes:
  db_data:

networks:
  carbontrack-network:
    driver: bridge
